<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Payments — EduMIS</title>
  <link rel="stylesheet" href="/static/css/style.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
</head>
<body>

<div id="toast"></div>
<div id="spinner"><div class="spin"></div></div>

<div class="modal-overlay" id="logoutModal">
  <div class="modal-box" style="max-width:340px">
    <div class="modal-body" style="text-align:center;padding:2rem">
      <div class="logout-icon"><i class="bi bi-power"></i></div>
      <h4 style="margin-bottom:.4rem">Sign out?</h4>
      <p style="color:var(--text-3);font-size:.875rem;margin-bottom:1.5rem">You'll need to sign in again.</p>
      <div style="display:flex;gap:.75rem;justify-content:center">
        <button class="btn btn-secondary" onclick="closeModal('logoutModal')">Cancel</button>
        <button class="btn btn-danger" onclick="doLogout()">Sign Out</button>
      </div>
    </div>
  </div>
</div>

<div class="app-shell">
  <div class="sb-overlay" id="sbOverlay" onclick="closeSidebar()"></div>

  <aside class="sidebar" id="sidebar">
    <div class="sb-brand"><i class="bi bi-mortarboard-fill"></i><span>EduMIS</span></div>
    <div class="sb-user">
      <div class="sb-avatar" id="sbAvatar">A</div>
      <div class="sb-user-info"><strong id="sbName">—</strong><small id="sbSub">—</small></div>
    </div>
    <nav class="sb-nav">
      <a class="sb-link" href="/pages/dashboard.html"><i class="bi bi-grid-1x2-fill"></i><span>Dashboard</span></a>
      <a class="sb-link" href="/pages/profile.html"><i class="bi bi-person-fill"></i><span>My Profile</span></a>
      <a class="sb-link active" href="/pages/payments.html"><i class="bi bi-wallet2"></i><span>Payments</span></a>
    </nav>
    <div class="sb-footer">
      <div class="sb-logout" onclick="showLogout()"><i class="bi bi-box-arrow-left"></i><span>Logout</span></div>
    </div>
  </aside>

  <div class="app-main">
    <header class="topbar">
      <button class="topbar-menu" onclick="openSidebar()"><i class="bi bi-list"></i></button>
      <div class="topbar-title">
        <h2>Payments</h2>
        <span class="topbar-date" id="dateLabel"></span>
      </div>
      <div class="topbar-avatar" id="topAvatar">A</div>
    </header>

    <div class="page" id="pageContent"></div>
  </div>
</div>

<script src="/static/js/api.js"></script>
<script>
'use strict';

(async () => {
  const user = await requireAuth('student');
  if (!user) return;
  setSidebarUser(user);
  document.getElementById('topAvatar').textContent = (user.name||'S')[0].toUpperCase();
  setDateLabel();
  loadPayments();
})();

let allPayments = [];

async function loadPayments() {
  showSpinner();
  const res = await GET('/api/payments');
  hideSpinner();
  if (!res.ok) { toast('Session expired.','error'); return; }
  allPayments = res.data.payments;
  render(res.data);
}

function render({ payments, summary }) {
  document.getElementById('pageContent').innerHTML = `
    <div class="cards-row three">
      <div class="scard green">
        <div class="sc-icon"><i class="bi bi-check-circle-fill"></i></div>
        <div><p class="sc-label">Total Paid</p><h3 class="sc-value">₹${fmt(summary.paid)}</h3></div>
      </div>
      <div class="scard orange">
        <div class="sc-icon"><i class="bi bi-clock-fill"></i></div>
        <div><p class="sc-label">Amount Due</p><h3 class="sc-value">₹${fmt(summary.due)}</h3></div>
      </div>
      <div class="scard blue">
        <div class="sc-icon"><i class="bi bi-receipt-cutoff"></i></div>
        <div><p class="sc-label">Total Billed</p><h3 class="sc-value">₹${fmt(summary.total)}</h3></div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-header">
        <h4><i class="bi bi-table"></i> Payment History</h4>
        <select class="inp" id="statusFilter" onchange="filterTable()" style="width:auto;font-size:.8rem;padding:.35rem .85rem">
          <option value="">All</option>
          <option value="Paid">Paid</option>
          <option value="Pending">Pending</option>
          <option value="Overdue">Overdue</option>
        </select>
      </div>
      <div class="tbl-wrap">
        <table class="tbl" id="payTbl">
          <thead>
            <tr><th>#</th><th>Description</th><th>Amount</th><th>Due Date</th><th>Paid Date</th><th>Receipt</th><th>Status</th></tr>
          </thead>
          <tbody id="payBody">
            ${renderRows(payments)}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

function renderRows(payments) {
  if (!payments.length) return `<tr><td colspan="7" class="tbl-empty"><i class="bi bi-wallet2"></i>No payment records.</td></tr>`;
  return payments.map((p,i) => `
    <tr data-status="${esc(p.status)}">
      <td class="text-muted">${i+1}</td>
      <td>${esc(p.description)}</td>
      <td class="fw6">₹${fmt(p.amount)}</td>
      <td>${fmtDate(p.due_date)}</td>
      <td>${fmtDate(p.paid_date)}</td>
      <td class="mono" style="font-size:.75rem">${p.receipt_no||'—'}</td>
      <td>
        <span class="status ${statusClass(p.status)}">
          <i class="bi bi-${p.status==='Paid'?'check-circle-fill':p.status==='Overdue'?'exclamation-circle-fill':'clock-fill'}"></i>
          ${esc(p.status)}
        </span>
      </td>
    </tr>`).join('');
}

function filterTable() {
  const val = document.getElementById('statusFilter').value;
  document.querySelectorAll('#payBody tr[data-status]').forEach(tr => {
    tr.style.display = (!val || tr.dataset.status === val) ? '' : 'none';
  });
}
</script>
</body>
</html>
