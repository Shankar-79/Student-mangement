<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Dashboard — EduMIS</title>
  <link rel="stylesheet" href="/static/css/style.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
</head>
<body>

<div id="toast"></div>
<div id="spinner"><div class="spin"></div></div>

<!-- Logout modal -->
<div class="modal-overlay" id="logoutModal">
  <div class="modal-box" style="max-width:340px">
    <div class="modal-body" style="text-align:center;padding:2rem">
      <div class="logout-icon"><i class="bi bi-power"></i></div>
      <h4 style="margin-bottom:.4rem">Sign out?</h4>
      <p style="color:var(--text-3);font-size:.875rem;margin-bottom:1.5rem">You'll need to sign in again to access your portal.</p>
      <div style="display:flex;gap:.75rem;justify-content:center">
        <button class="btn btn-secondary" onclick="closeModal('logoutModal')">Cancel</button>
        <button class="btn btn-danger" onclick="doLogout()">Sign Out</button>
      </div>
    </div>
  </div>
</div>

<div class="app-shell">

  <!-- Sidebar overlay (mobile) -->
  <div class="sb-overlay" id="sbOverlay" onclick="closeSidebar()"></div>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sb-brand"><i class="bi bi-mortarboard-fill"></i><span>EduMIS</span></div>
    <div class="sb-user">
      <div class="sb-avatar" id="sbAvatar">A</div>
      <div class="sb-user-info">
        <strong id="sbName">—</strong>
        <small id="sbSub">—</small>
      </div>
    </div>
    <nav class="sb-nav">
      <a class="sb-link active" href="/pages/dashboard.html"><i class="bi bi-grid-1x2-fill"></i><span>Dashboard</span></a>
      <a class="sb-link" href="/pages/profile.html"><i class="bi bi-person-fill"></i><span>My Profile</span></a>
      <a class="sb-link" href="/pages/payments.html"><i class="bi bi-wallet2"></i><span>Payments</span></a>
    </nav>
    <div class="sb-footer">
      <div class="sb-logout" onclick="showLogout()"><i class="bi bi-box-arrow-left"></i><span>Logout</span></div>
    </div>
  </aside>

  <!-- Main -->
  <div class="app-main">
    <header class="topbar">
      <button class="topbar-menu" onclick="openSidebar()"><i class="bi bi-list"></i></button>
      <div class="topbar-title">
        <h2>Dashboard</h2>
        <span class="topbar-date" id="dateLabel"></span>
      </div>
      <div class="topbar-avatar" id="topAvatar">A</div>
    </header>

    <div class="page" id="pageContent">
      <!-- filled by JS -->
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
<script src="/static/js/api.js"></script>
<script>
'use strict';

(async () => {
  const user = await requireAuth('student');
  if (!user) return;
  setSidebarUser(user);
  document.getElementById('topAvatar').textContent = (user.name||'S')[0].toUpperCase();
  setDateLabel();
  loadDashboard();
})();

async function loadDashboard() {
  showSpinner();
  const res = await GET('/api/dashboard');
  hideSpinner();
  if (!res.ok) { toast('Session expired. Please login again.','error'); setTimeout(()=>doLogout(),1500); return; }

  const { student, notices, attendance, marks, pending_fees, att_pct } = res.data;


  const markMap = {};
  marks.forEach(m => {
    if (!markMap[m.subject_name]) markMap[m.subject_name] = { sum:0, cnt:0 };
    markMap[m.subject_name].sum += m.marks;
    markMap[m.subject_name].cnt++;
  });
  const markLabels = Object.keys(markMap);
  const markVals   = markLabels.map(k => +(markMap[k].sum/markMap[k].cnt).toFixed(1));

  const attLabels = attendance.map(a => a.subject_name);
  const attVals   = attendance.map(a => a.total_classes > 0 ? +(a.attended/a.total_classes*100).toFixed(1) : 0);

  // Pending colour
  const feeColor  = pending_fees.cnt > 0 ? 'orange' : 'green';
  const attColor  = att_pct >= 75 ? 'green' : 'red';
  const attNote   = att_pct >= 75 ? 'Good standing' : 'Below 75% — at risk';

  document.getElementById('pageContent').innerHTML = `
    <!-- Stat cards -->
    <div class="cards-row">
      <div class="scard blue">
        <div class="sc-icon"><i class="bi bi-book-fill"></i></div>
        <div>
          <p class="sc-label">Subjects</p>
          <h3 class="sc-value">${attendance.length}</h3>
          <p class="sc-sub">${esc(student.branch)}</p>
        </div>
      </div>
      <div class="scard ${attColor}">
        <div class="sc-icon"><i class="bi bi-calendar2-check-fill"></i></div>
        <div>
          <p class="sc-label">Attendance</p>
          <h3 class="sc-value">${att_pct}%</h3>
          <p class="sc-sub">${attNote}</p>
        </div>
      </div>
      <div class="scard ${feeColor}">
        <div class="sc-icon"><i class="bi bi-wallet-fill"></i></div>
        <div>
          <p class="sc-label">Pending Fees</p>
          <h3 class="sc-value">₹${fmt(pending_fees.total)}</h3>
          <p class="sc-sub">${pending_fees.cnt} payment(s) due</p>
        </div>
      </div>
      <div class="scard purple">
        <div class="sc-icon"><i class="bi bi-mortarboard-fill"></i></div>
        <div>
          <p class="sc-label">Year / Section</p>
          <h3 class="sc-value" style="font-size:1.1rem">${esc(student.branch)}</h3>
          <p class="sc-sub">Year ${student.year} · Sec ${esc(student.section)}</p>
        </div>
      </div>
    </div>

    <!-- Charts -->
    <div class="two-col">
      <div class="panel">
        <div class="panel-header"><h4><i class="bi bi-bar-chart-fill"></i> Marks Overview</h4><span class="chip">Avg per subject</span></div>
        <div class="panel-body"><div class="chart-wrap"><canvas id="marksChart"></canvas></div></div>
      </div>
      <div class="panel">
        <div class="panel-header"><h4><i class="bi bi-pie-chart-fill"></i> Attendance</h4><span class="chip">Current Sem</span></div>
        <div class="panel-body"><div class="chart-wrap"><canvas id="attChart"></canvas></div></div>
      </div>
    </div>

    <!-- Marks table + Notices -->
    <div class="two-col">
      <div class="panel">
        <div class="panel-header"><h4><i class="bi bi-table"></i> Recent Marks</h4></div>
        <div class="tbl-wrap">
          <table class="tbl">
            <thead><tr><th>Subject</th><th>Type</th><th>Marks</th><th>%</th><th>Grade</th></tr></thead>
            <tbody>
              ${marks.slice(0,10).map(m=>{
                const pct = +(m.marks/m.max_marks*100).toFixed(1);
                return `<tr>
                  <td>${esc(m.subject_name)}</td>
                  <td><span class="chip">${esc(m.exam_type)}</span></td>
                  <td class="fw6">${m.marks|0}/${m.max_marks|0}</td>
                  <td>${pct}%</td>
                  <td><span class="grade grade-${gradeClass(pct)}">${gradeLetter(pct)}</span></td>
                </tr>`;
              }).join('')}
              ${marks.length===0?`<tr><td colspan="5" class="tbl-empty"><i class="bi bi-clipboard-x"></i>No marks yet.</td></tr>`:''}
            </tbody>
          </table>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header">
          <h4><i class="bi bi-megaphone-fill"></i> Notices</h4>
          <span class="badge-count">${notices.length}</span>
        </div>
        <ul class="notice-list">
          ${notices.map(n=>`
            <li class="notice-item">
              <div class="ni-dot ${categoryClass(n.category)}"></div>
              <div>
                <div class="ni-meta">
                  <span class="ncat ${categoryClass(n.category)}">${esc(n.category)}</span>
                  <span class="ni-date">${fmtDate(n.created_at)}</span>
                </div>
                <p class="ni-title">${esc(n.title)}</p>
                <p class="ni-body">${esc(n.body.slice(0,110))}${n.body.length>110?'…':''}</p>
              </div>
            </li>`).join('')}
          ${notices.length===0?'<li style="padding:2rem;text-align:center;color:var(--text-3)">No notices.</li>':''}
        </ul>
      </div>
    </div>
  `;

  // ── Charts ──────────────────────────────────────────────
  Chart.defaults.font.family = "'DM Sans',sans-serif";
  Chart.defaults.color = '#94a3b8';

  new Chart(document.getElementById('marksChart'), {
    type: 'bar',
    data: {
      labels: markLabels,
      datasets: [{
        label: 'Avg Marks',
        data: markVals,
        backgroundColor: markVals.map(v => v>=80?'rgba(5,150,105,.82)':v>=65?'rgba(37,99,235,.82)':v>=50?'rgba(217,119,6,.82)':'rgba(220,38,38,.82)'),
        borderRadius: 6, borderSkipped: false, barThickness: 28,
      }]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false}, tooltip:{callbacks:{label:c=>` ${c.parsed.y}/100`}} },
      scales:{
        y:{min:0,max:100,ticks:{callback:v=>v+'%'},grid:{color:'#f1f5f9'}},
        x:{grid:{display:false},ticks:{maxRotation:30,callback:function(v){const l=this.getLabelForValue(v);return l.length>13?l.slice(0,12)+'…':l;}}}
      }
    }
  });

  new Chart(document.getElementById('attChart'), {
    type: 'doughnut',
    data: {
      labels: attLabels,
      datasets: [{
        data: attVals,
        backgroundColor: ['#2563eb','#7c3aed','#059669','#d97706','#dc2626','#0891b2'],
        borderColor: '#fff', borderWidth: 3, hoverOffset: 8,
      }]
    },
    options: {
      responsive:true, maintainAspectRatio:false, cutout:'62%',
      plugins:{
        legend:{ position:'right', labels:{boxWidth:10,boxHeight:10,usePointStyle:true,padding:12,font:{size:11}} },
        tooltip:{callbacks:{label:c=>` ${c.label}: ${c.parsed}%`}}
      }
    }
  });
}
</script>
</body>
</html>
