<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>My Profile — EduMIS</title>
  <link rel="stylesheet" href="/static/css/style.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
</head>
<body>

<div id="toast"></div>
<div id="spinner"><div class="spin"></div></div>

<!-- Logout modal -->
<div class="modal-overlay" id="logoutModal">
  <div class="modal-box" style="max-width:340px">
    <div class="modal-body" style="text-align:center;padding:2rem">
      <div class="logout-icon"><i class="bi bi-power"></i></div>
      <h4 style="margin-bottom:.4rem">Sign out?</h4>
      <p style="color:var(--text-3);font-size:.875rem;margin-bottom:1.5rem">You'll need to sign in again.</p>
      <div style="display:flex;gap:.75rem;justify-content:center">
        <button class="btn btn-secondary" onclick="closeModal('logoutModal')">Cancel</button>
        <button class="btn btn-danger" onclick="doLogout()">Sign Out</button>
      </div>
    </div>
  </div>
</div>

<div class="app-shell">
  <div class="sb-overlay" id="sbOverlay" onclick="closeSidebar()"></div>

  <aside class="sidebar" id="sidebar">
    <div class="sb-brand"><i class="bi bi-mortarboard-fill"></i><span>EduMIS</span></div>
    <div class="sb-user">
      <div class="sb-avatar" id="sbAvatar">A</div>
      <div class="sb-user-info"><strong id="sbName">—</strong><small id="sbSub">—</small></div>
    </div>
    <nav class="sb-nav">
      <a class="sb-link" href="/pages/dashboard.html"><i class="bi bi-grid-1x2-fill"></i><span>Dashboard</span></a>
      <a class="sb-link active" href="/pages/profile.html"><i class="bi bi-person-fill"></i><span>My Profile</span></a>
      <a class="sb-link" href="/pages/payments.html"><i class="bi bi-wallet2"></i><span>Payments</span></a>
    </nav>
    <div class="sb-footer">
      <div class="sb-logout" onclick="showLogout()"><i class="bi bi-box-arrow-left"></i><span>Logout</span></div>
    </div>
  </aside>

  <div class="app-main">
    <header class="topbar">
      <button class="topbar-menu" onclick="openSidebar()"><i class="bi bi-list"></i></button>
      <div class="topbar-title">
        <h2>My Profile</h2>
        <span class="topbar-date" id="dateLabel"></span>
      </div>
      <div class="topbar-avatar" id="topAvatar">A</div>
    </header>

    <div class="page" id="pageContent"></div>
  </div>
</div>

<script src="/static/js/api.js"></script>
<script>
'use strict';

(async () => {
  const user = await requireAuth('student');
  if (!user) return;
  setSidebarUser(user);
  document.getElementById('topAvatar').textContent = (user.name||'S')[0].toUpperCase();
  setDateLabel();
  loadProfile();
})();

async function loadProfile() {
  showSpinner();
  const res = await GET('/api/profile');
  hideSpinner();
  if (!res.ok) { toast('Session expired.','error'); return; }
  render(res.data);
}

function render(s) {
  document.getElementById('pageContent').innerHTML = `
    <div class="profile-layout">

      <!-- Left info card -->
      <div class="panel">
        <div class="panel-body" style="text-align:center">
          <div class="prof-avatar">${(s.name||'?')[0].toUpperCase()}</div>
          <h4 style="margin-bottom:.2rem">${esc(s.name)}</h4>
          <p class="mono text-muted" style="font-size:.8rem;margin-bottom:.9rem">${esc(s.roll_no)}</p>
          <div class="tag-list">
            <span class="tag"><i class="bi bi-building"></i>${esc(s.branch)}</span>
            <span class="tag"><i class="bi bi-mortarboard"></i>Year ${s.year}</span>
            <span class="tag"><i class="bi bi-people"></i>Sec ${esc(s.section)}</span>
          </div>
          <div class="detail-list">
            <div class="detail-item"><i class="bi bi-envelope-fill"></i><span>${esc(s.email)}</span></div>
            <div class="detail-item"><i class="bi bi-telephone-fill"></i><span>${s.phone||'—'}</span></div>
            <div class="detail-item"><i class="bi bi-calendar3"></i><span>${fmtDate(s.dob)||'—'}</span></div>
            <div class="detail-item" style="align-items:flex-start"><i class="bi bi-geo-alt-fill" style="margin-top:2px"></i><span>${esc(s.address)||'—'}</span></div>
          </div>
        </div>
      </div>

      <!-- Right edit form -->
      <div class="panel">
        <div class="panel-header"><h4><i class="bi bi-pencil-square"></i> Edit Information</h4></div>
        <div class="panel-body">
          <form id="profileForm" novalidate>
            <div class="form-grid two" style="margin-bottom:.85rem">
              <div class="form-field">
                <label>Full Name <span class="req">*</span></label>
                <input class="inp" name="name" value="${esc(s.name)}" required minlength="2"/>
              </div>
              <div class="form-field">
                <label>Email Address <span class="req">*</span></label>
                <input class="inp" name="email" type="email" value="${esc(s.email)}" required/>
              </div>
              <div class="form-field">
                <label>Phone Number</label>
                <input class="inp" name="phone" type="tel" value="${esc(s.phone||'')}" pattern="[0-9]{10,13}"/>
              </div>
              <div class="form-field">
                <label>Date of Birth</label>
                <input class="inp" name="dob" type="date" value="${s.dob||''}"/>
              </div>
            </div>
            <div class="form-field" style="margin-bottom:.85rem">
              <label>Address</label>
              <textarea class="inp" name="address" rows="3">${esc(s.address||'')}</textarea>
            </div>
            <div class="form-grid three" style="margin-bottom:1.2rem">
              <div class="form-field">
                <label>Branch</label>
                <input class="inp readonly-inp" value="${esc(s.branch)}" readonly/>
              </div>
              <div class="form-field">
                <label>Year</label>
                <input class="inp readonly-inp" value="Year ${s.year}" readonly/>
              </div>
              <div class="form-field">
                <label>Section</label>
                <input class="inp readonly-inp" value="${esc(s.section)}" readonly/>
              </div>
            </div>
            <div style="display:flex;gap:.75rem">
              <button type="submit" class="btn btn-primary"><i class="bi bi-check2-circle"></i> Save Changes</button>
              <button type="reset"  class="btn btn-secondary"><i class="bi bi-arrow-counterclockwise"></i> Reset</button>
            </div>
          </form>
        </div>
      </div>

    </div>
  `;

  document.getElementById('profileForm').addEventListener('submit', async e => {
    e.preventDefault();
    if (!validateForm(e.target)) { toast('Please fill required fields.','error'); return; }

    // Email validation
    const email = e.target.email.value.trim();
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      toast('Please enter a valid email.','error');
      e.target.email.classList.add('err');
      return;
    }

    const data = formData(e.target);
    showSpinner();
    const res = await POST('/api/profile', data);
    hideSpinner();

    if (res.ok) {
      toast('Profile updated!','success');
      // Update sidebar name
      const session = Auth.load();
      if (session) { session.name = data.name; Auth.save(session); setSidebarUser(session); }
      setTimeout(loadProfile, 600);
    } else {
      toast(res.data.error||'Update failed','error');
    }
  });
}
</script>
</body>
</html>
