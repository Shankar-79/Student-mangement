<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Sign In — Student MIS</title>
  <link rel="stylesheet" href="/static/css/style.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
</head>
<body>

<div id="toast"></div>

<div class="login-root">
  <div class="login-panel">
    <div class="blobs">
      <div class="blob blob1"></div><div class="blob blob2"></div><div class="blob blob3"></div>
    </div>
    <div class="login-panel-inner">
      <div class="lp-logo"><i class="bi bi-mortarboard-fill"></i><span>EduMIS</span></div>
      <h2 class="lp-headline">Your academic<br/>universe, unified.</h2>
    </div>
  </div>

  <div class="login-form-side">
    <div class="login-card">
      <div class="lc-header">
        <h1>Welcome back</h1>
        <p>Sign in to your portal account</p>
      </div>

      <div class="role-toggle">
        <button class="role-btn active" id="btnStudent" onclick="setRole('student')">
          <i class="bi bi-person-fill"></i> Student
        </button>
        <button class="role-btn" id="btnAdmin" onclick="setRole('admin')">
          <i class="bi bi-shield-fill"></i> Admin
        </button>
      </div>

      <form id="loginForm" novalidate>
        <div class="field-group">
          <label id="unLabel" for="username">Email / Roll No</label>
          <div class="field-wrap">
            <i class="bi bi-person field-icon"></i>
            <input type="text" id="username" class="field-input"
                   placeholder="Enter email or roll no"
                   autocomplete="off" spellcheck="false" required/>
          </div>
          <span class="field-err" id="usernameErr"></span>
        </div>

        <div class="field-group">
          <label for="password">Password</label>
          <div class="field-wrap">
            <i class="bi bi-lock field-icon"></i>
            <input type="password" id="password" class="field-input"
                   placeholder="Enter your password"
                   autocomplete="current-password" required/>
            <button type="button" class="toggle-pw" onclick="togglePw()">
              <i class="bi bi-eye" id="pwEye"></i>
            </button>
          </div>
          <span class="field-err" id="passwordErr"></span>
        </div>

        <button type="submit" class="btn-login" id="loginBtn">
          <span id="loginText">Sign In</span>
          <i class="bi bi-arrow-right-circle-fill"></i>
        </button>
      </form>
    </div>
  </div>
</div>

<script src="/static/js/api.js"></script>
<script>
'use strict';

var currentRole = 'student';


var CREDS = {
  student: { u: ['arjun','student.edu'].join('@'), p: ['pass','123'].join('@') },
  admin:   { u: 'admin',                           p: ['admin','123'].join('@') }
};

function updateHint(role) {
  var c = CREDS[role];
  document.getElementById('demoHint').innerHTML =
    '<i class="bi bi-info-circle"></i>&nbsp;Demo:&nbsp;<code>' + c.u + '</code>&nbsp;/&nbsp;<code>' + c.p + '</code>';
}

function setRole(role) {
  currentRole = role;
  document.getElementById('btnStudent').classList.toggle('active', role === 'student');
  document.getElementById('btnAdmin').classList.toggle('active', role === 'admin');
  if (role === 'admin') {
    document.getElementById('unLabel').textContent = 'Admin Username';
    document.getElementById('username').placeholder = 'e.g. admin';
  } else {
    document.getElementById('unLabel').textContent = 'Email / Roll No';
    document.getElementById('username').placeholder = 'Enter email or roll no';
  }
  updateHint(role);
}

function togglePw() {
  var pw  = document.getElementById('password');
  var eye = document.getElementById('pwEye');
  if (pw.type === 'password') { pw.type = 'text';     eye.className = 'bi bi-eye-slash'; }
  else                        { pw.type = 'password'; eye.className = 'bi bi-eye'; }
}

function setErr(id, msg) { var el=document.getElementById(id); if(el) el.textContent=msg; }
function clrErr(id)      { setErr(id,''); }


(async function() {
  var u = Auth.user();
  if (!u || !u.token) return;
  try {
    var ping = u.role === 'admin' ? '/api/admin/ping' : '/api/ping';
    var res  = await api('GET', ping);
    if (res.ok && res.data && res.data.ok) {
      location.replace(u.role === 'admin' ? '/pages/admin.html' : '/pages/dashboard.html');
    } else {
      Auth.clear();
    }
  } catch(e) { Auth.clear(); }
})();


document.getElementById('loginForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  clrErr('usernameErr'); clrErr('passwordErr');

  var username = document.getElementById('username').value.trim();
  var password = document.getElementById('password').value;
  var ok = true;

  if (!username) { setErr('usernameErr','This field is required.'); document.getElementById('username').classList.add('err'); ok=false; }
  else document.getElementById('username').classList.remove('err');

  if (!password) { setErr('passwordErr','Password is required.'); document.getElementById('password').classList.add('err'); ok=false; }
  else document.getElementById('password').classList.remove('err');

  if (!ok) return;

  var btn = document.getElementById('loginBtn');
  var txt = document.getElementById('loginText');
  btn.disabled = true;
  txt.textContent = 'Signing in...';

  try {
    var res = await POST('/api/login', { role: currentRole, username: username, password: password });

    if (res.ok && res.data && res.data.ok) {
      Auth.save(res.data);
      toast('Login successful!', 'success');
      setTimeout(function() {
        location.replace(res.data.role === 'admin' ? '/pages/admin.html' : '/pages/dashboard.html');
      }, 300);
    } else {
      var msg = (res.data && res.data.error) ? res.data.error : 'Invalid credentials. Please try again.';
      toast(msg, 'error');
      setErr('usernameErr', 'Invalid username or password.');
      btn.disabled = false;
      txt.textContent = 'Sign In';
    }
  } catch(err) {
    toast('Cannot reach server. Make sure server.py is running.', 'error');
    btn.disabled = false;
    txt.textContent = 'Sign In';
  }
});


updateHint('student');
</script>
</body>
</html>
